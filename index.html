<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yajuオセロ盤面検討ツール</title>
<script>
// CSSロード前にテーマを適用してフラッシュ防止
(function() {
  const t = localStorage.getItem('othello-theme') || 'light';
  document.documentElement.setAttribute('data-bs-theme', t);
})();
</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'M PLUS 1', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  background: #f6f8fa;
}
[data-bs-theme="dark"] body {
  background: #0d1117;
}

h1 {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.app-card {
  background: #fff;
  border: 1px solid #d0d7de;
  border-radius: 16px;
  padding: 24px;
  max-width: 720px;
  margin: 0 auto;
}
[data-bs-theme="dark"] .app-card {
  background: #161b22;
  border-color: #30363d;
}

/* ===== Board ===== */
#board {
  display: grid;
  grid-template-columns: 18px repeat(8, 60px) 18px;
  grid-template-rows: 18px repeat(8, 60px) 18px;
  gap: 2px;
  justify-content: center;
  margin: 16px auto;
  background: #1b3a2d;
  border-radius: 10px;
  padding: 4px;
  width: fit-content;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}
.board-label {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: #a0a8b0;
}
[data-bs-theme="dark"] .board-label {
  color: #c9d1d9;
}
.cell {
  position: relative;
  width: 60px;
  height: 60px;
  background: #2d6a4f;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.12s;
}
.cell:hover {
  background: #3a7d5e;
}
.last-move {
  box-shadow: inset 0 0 0 3px #f97316;
}
.hint-ref-black { background: rgba(239, 68, 68, 0.75); }
.hint-ref-white { background: rgba(248, 113, 113, 0.75); }
.stone {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  position: relative;
  overflow: hidden; /* ← 側面をはみ出さないように */
  box-shadow: 
    inset 0 -4px 6px rgba(0,0,0,0.25),
    0 2px 4px rgba(0,0,0,0.3);
}

/* 黒石（よりフラット寄り） */
.black {
  background: radial-gradient(circle at 50% 40%, #2a2a2a 0%, #000 75%);
}

/* 白石（よりはっきり） */
.white {
  background: radial-gradient(circle at 50% 40%, #ffffff 0%, #e5e5e5 80%);
  border: 1px solid rgba(0,0,0,0.15);
}
.stone::before {
  content: "";
  position: absolute;
  left: 8%;
  right: 8%;
  bottom: -6px;            /* ← 少し下にずらす */
  height: 16px;            /* ← 厚み */
  border-radius: 50%;
  z-index: 0;
}

.hint {
  width: 14px;
  height: 14px;
  border-radius: 50%;
}
.hint-black { background: rgba(0, 0, 0, 0.3); }
.hint-white { background: rgba(255, 255, 255, 0.173); }

/* ===== Stone count ===== */
#stone-count {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.stat-cards {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 8px;
}
.stat-card {
  display: flex;
  flex-direction: column;
  justify-content: center;   /* ← 追加 */
  align-items: center;
  padding: 10px 20px;
  border-radius: 12px;
  min-width: 76px;
  gap: 2px;
  height: 90px;              /* ← 高さを固定 */
}
.stat-card-black {
  background: #1c1c1e;
  color: #fff;
}
[data-bs-theme="dark"] .stat-card-black {
  background: #2c2c2e;
}
.stat-card-white {
  background: #f0f0f0;
  color: #111;
  border: 1px solid #d8d8d8;
}
[data-bs-theme="dark"] .stat-card-white {
  background: #e8e8ea;
}
.stat-card-remaining {
  background: #eaf4ec;
  color: #1a7f37;
  border: 1px solid rgba(26, 127, 55, 0.2);
}
[data-bs-theme="dark"] .stat-card-remaining {
  background: rgba(63, 185, 80, 0.1);
  color: #3fb950;
  border-color: rgba(63, 185, 80, 0.25);
}
.stat-mini-stone {
  width: 24px;
  height: 24px;
  border-radius: 50%;
}
.stat-card-black .stat-mini-stone {
  background: radial-gradient(circle at 35% 35%, #666, #111);
  box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}
.stat-card-white .stat-mini-stone {
  background: radial-gradient(circle at 35% 35%, #fff, #ccc);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
.stat-num {
  font-size: 1.7rem;
  font-weight: 700;
  line-height: 1;   /* ← これが超重要 */
}
.stat-label {
  font-size: 0.72rem;
  opacity: 0.75;
  letter-spacing: 0.04em;

  max-width: 70px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.balance-bar-wrap {
  width: 240px;
  height: 5px;
  background: #e0e0e0;
  border-radius: 3px;
  overflow: hidden;
}
[data-bs-theme="dark"] .balance-bar-wrap {
  background: #30363d;
}
.balance-bar {
  height: 100%;
  background: #1c1c1e;
  border-radius: 3px;
  transition: width 0.3s ease;
}
[data-bs-theme="dark"] .balance-bar {
  background: #8b949e;
}

/* ===== Info / Endgame ===== */
#info {
  font-size: 1rem;
  font-weight: 600;
  color: #0969da;
}
[data-bs-theme="dark"] #info {
  color: #58a6ff;
}
#endgame {
  font-size: 0.85rem;
  color: #1a7f37;
  background: rgba(26, 127, 55, 0.08);
  border: 1px solid rgba(26, 127, 55, 0.3);
  border-radius: 8px;
  padding: 6px 14px;
  display: inline-block;
}
[data-bs-theme="dark"] #endgame {
  color: #3fb950;
  background: rgba(63, 185, 80, 0.08);
  border-color: rgba(63, 185, 80, 0.25);
}
#endgame:empty { display: none; }

/* ===== Buttons ===== */
.btn { border-radius: 8px; font-weight: 500; letter-spacing: 0.03em; touch-action: manipulation; }
.btn-primary {
  background: #1a7f37;
  border-color: #1a7f37;
}
.btn-primary:hover {
  background: #2ea043;
  border-color: #2ea043;
}

hr { opacity: 1; border-color: #d0d7de; }
[data-bs-theme="dark"] hr { border-color: #21262d; }

.collapse-toggle::after { content: " ▴"; }
.collapse-toggle.collapsed::after { content: " ▾"; }

/* ===== スマホ用 (横幅560px以下) ===== */
@media (max-width: 560px) {

  .stat-card {
    padding: 6px 14px;     /* ← 10px 20px → 圧縮 */
    gap: 1px;              /* ← 2px → 圧縮 */
    min-width: 64px;       /* 少し細く */
  }

  .stat-num {
    font-size: 1.3rem;     /* 1.7rem → 少し縮小 */
  }

  .stat-mini-stone {
    width: 18px;
    height: 18px;
  }

  .balance-bar-wrap {
    height: 3px;           /* 5px → 薄く */
  }

  #stone-count {
    gap: 4px;              /* 上下の間隔を詰める */
  }

}
@media (max-width: 560px) {
  h1 { font-size: 1.1em; }
  .app-card {
    padding: 12px;
    border-radius: 0;
    border-left: none;
    border-right: none;
  }
  #board {
    grid-template-columns: 13px repeat(8, 38px) 13px;
    grid-template-rows: 13px repeat(8, 38px) 13px;
    gap: 1px;
    margin: 6px auto;
    padding: 2px;
  }
  .board-label { font-size: 10px; }
  .cell { width: 38px; height: 38px; }
  .stone { width: 28px; height: 28px; }
  .hint { width: 9px; height: 9px; }
}
@media (max-width: 560px) {
  /* ヘッダーを絶対1行に */
  .app-card > .d-flex.justify-content-between {
    flex-wrap: nowrap;
    gap: 6px;
  }

  /* 左のダミー幅を消して横幅を確保 */
  #header-spacer {
    display: none;
  }

  /* タイトルを1行省略表示にする */
  h1 {
    flex: 1;
    min-width: 0;              /* ← text-overflowに必須 */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;    /* 少し詰める（任意） */
  }

  /* ボタンを固定幅やめて小さく */
  #theme-toggle {
    width: auto !important;
    padding: 4px 8px;
    white-space: nowrap;
    flex: 0 0 auto;
  }
}
/* ===== タブレット中間サイズ (561px〜767px) ===== */
/* Bootstrapのsmブレークポイント(container固定540px)を解除してapp-cardを広げる */
@media (min-width: 561px) and (max-width: 767px) {
  .container {
    max-width: 100%;
    padding-left: 0;
    padding-right: 0;
  }
  .app-card {
    padding: 16px 8px;
    border-radius: 0;
    border-left: none;
    border-right: none;
  }
}

/* ===== さらに小さい端末 (横幅360px以下) ===== */
@media (max-width: 360px) {
  #board {
    grid-template-columns: 11px repeat(8, 33px) 11px;
    grid-template-rows: 11px repeat(8, 33px) 11px;
  }
  .cell { width: 33px; height: 33px; }
  .stone { width: 24px; height: 24px; }
  .hint { width: 8px; height: 8px; }
}
/* ===== 最善手の青点 ===== */
.best-move-dot {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #00ddff;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 2;
  box-shadow: 0 0 2px rgba(2, 103, 255, 0.8);
}
@media (max-width: 560px) {
  .best-move-dot { width: 3px; height: 3px; }
}

/* ===== 手番号表示 ===== */
.stone-num {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  pointer-events: none;
  z-index: 1;
  font-family: 'M PLUS 1', sans-serif;
}
.stone-num-by-black {
  color: #000;
  text-shadow: 0 0 3px #fff, 0 0 3px #fff;
}
.stone-num-by-white {
  color: #fff;
  text-shadow: 0 0 3px #000, 0 0 3px #000;
}
@media (max-width: 560px) {
  .stone-num { font-size: 11px; }
}
@media (max-width: 360px) {
  .stone-num { font-size: 9px; }
}

/* ===== YJ石モード ===== */
.custom-stones .stone.black { border: none; }
.custom-stones .stone.white { border: none; }
.custom-stones .stone::before { display: none; }
.custom-stones .stone { box-shadow: none; }
.custom-stones .stone.black::after,
.custom-stones .stone.white::after {
  content: "";
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  z-index: 0;
}
.custom-stones .stone.black::after {
  background: url('YJB.png') center/cover no-repeat;
}
.custom-stones .stone.white::after {
  background: url('YJW.png') center/cover no-repeat;
}
.stat-mini-stone { position: relative; }
.custom-stones .stat-card-black .stat-mini-stone { box-shadow: none; }
.custom-stones .stat-card-white .stat-mini-stone { box-shadow: none; }
.custom-stones .stat-card-black .stat-mini-stone::after,
.custom-stones .stat-card-white .stat-mini-stone::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
}
.custom-stones .stat-card-black .stat-mini-stone::after {
  background: url('YJB.png') center/cover no-repeat;
}
.custom-stones .stat-card-white .stat-mini-stone::after {
  background: url('YJW.png') center/cover no-repeat;
}

/* ===== 石差グラフ ===== */
.graph-caption {
  font-size: 0.68rem;
  text-align: left;
  padding-left: 2px;
  margin-bottom: 2px;
}
@media (max-width: 560px) {
  #graph-area > div { height: 70px !important; }
}

/* ===== スマホ最終上書き（ファイルの一番下に置く） ===== */
@media (max-width: 560px) {
  #stone-count .stat-card {
    height: 70px !important;
    padding: 6px 14px !important;
    gap: 1px !important;
    min-width: 64px !important;
  }

  #stone-count .stat-mini-stone {
    width: 18px;
    height: 18px;
  }

  #stone-count .stat-num {
    font-size: 1.3rem;
    line-height: 1; /* これは重要 */
  }

  #stone-count .balance-bar-wrap {
    height: 3px;
  }

  #stone-count {
    gap: 4px;
  }
}
@media (max-width: 560px) {

  /* ナビボタンのダブルタップズーム無効 */
  .btn {
    touch-action: manipulation;
  }

  /* プレイヤー名入力を2行に */
  #name-area {
    flex-wrap: wrap;
  }
  #name-inputs {
    width: 100%;
    justify-content: center;
  }

  /* 縦余白を細かく詰める */
  body {
    padding-top: 6px !important;
    padding-bottom: 6px !important;
  }
  .app-card > .d-flex.justify-content-between {
    margin-bottom: 0 !important;
  }
  #stone-count {
    margin-top: 4px !important;
    margin-bottom: 4px !important;
  }
  #info {
    margin-bottom: 4px !important;
  }
  .d-flex.flex-wrap.justify-content-center.gap-1 {
    margin-bottom: 4px !important;
  }
  #endgame {
    margin-top: 4px !important;
  }
  /* 棋譜・設定セパレーター */
  .d-flex.align-items-center.gap-2.my-3 {
    margin-top: 6px !important;
    margin-bottom: 6px !important;
  }
}
</style>
</head>
<body class="text-center py-4">

<div class="container">
  <div class="app-card">

    <div class="d-flex justify-content-between align-items-center mb-2">
      <div id="header-spacer"  style="width:88px"></div>
      <h1 class="mb-0">Yajuオセロ盤面検討ツール</h1>
      <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" style="width:88px" onclick="toggleTheme()"></button>
    </div>

    <div id="board"></div>

    <div id="stone-count" class="my-3">
      <div class="stat-cards">
        <div class="stat-card stat-card-black">
          <div class="stat-mini-stone"></div>
          <div class="stat-num" id="sc-black">2</div>
          <div class="stat-label" id="sc-black-name">黒</div>
        </div>
        <div class="stat-card stat-card-remaining">
  <div style="height:24px;"></div>  <!-- ダミーで高さ揃え -->
          <div class="stat-num" id="sc-empty">60</div>
          <div class="stat-label">残</div>
        </div>
        <div class="stat-card stat-card-white">
          <div class="stat-mini-stone"></div>
          <div class="stat-num" id="sc-white">2</div>
          <div class="stat-label" id="sc-white-name">白</div>
        </div>
      </div>
      <div class="balance-bar-wrap">
        <div class="balance-bar" id="balance-bar" style="width:50%"></div>
      </div>
    </div>

    <p id="info" class="mb-2"></p>

    <div class="d-flex flex-wrap justify-content-center gap-1 mb-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="goToFirst()">⏮ 最初</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="undo10()">◀◀ 10手戻</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="undo()">◀ 戻る</button>
      <button id="branch-btn" class="btn btn-outline-secondary btn-sm" onclick="goToBranchPoint()" disabled>分岐点へ</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="redo()">▶ 進む</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="redo10()">10手進 ▶▶</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="goToLast()">最後 ⏭</button>
    </div>

    <div class="d-flex justify-content-end gap-1 mt-2">
      <button id="endgame-toggle" class="btn btn-outline-secondary btn-sm py-0 px-2"
              onclick="toggleEndgameDisplay()" style="font-size:0.75rem;">読み切りを隠す</button>
      <button id="graph-toggle" class="btn btn-outline-secondary btn-sm py-0 px-2"
              onclick="toggleGraphDisplay()" style="font-size:0.75rem;">グラフを隠す</button>
    </div>

    <p id="endgame" class="mt-2 mb-0"></p>

    <div id="graph-area" class="mt-2">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
        <div class="text-secondary graph-caption" id="graph-caption-text">⚫石差の推移（+で黒有利 / −で白有利）</div>
        <span id="ai-status" class="graph-caption" style="color:#f97316; flex-shrink:0;">AI読み込み中…</span>
      </div>
      <div style="position:relative; height:90px;">
        <canvas id="score-graph"></canvas>
      </div>
    </div>

    <div class="d-flex align-items-center gap-2 my-3">
      <div class="flex-grow-1" style="height:1px;background:var(--bs-border-color);"></div>
      <button class="btn btn-outline-secondary btn-sm px-3 collapse-toggle collapsed"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#settings-panel"
              aria-expanded="false">棋譜・設定</button>
      <div class="flex-grow-1" style="height:1px;background:var(--bs-border-color);"></div>
    </div>

    <div class="collapse" id="settings-panel">
      <div id="kifu-area" class="mt-1 mx-auto" style="max-width:480px;">
        <div class="d-flex gap-2">
          <input type="text" id="kifu-input" class="form-control form-control-sm" style="min-width:0; flex:1;" placeholder="棋譜を入力 (例: d3c4...)" onclick="this.select()">
          <button class="btn btn-primary btn-sm text-nowrap" onclick="applyKifu()">棋譜を反映</button>
        </div>
      </div>

      <div id="current-kifu-area" class="mt-2 mx-auto" style="max-width:480px;">
        <div class="d-flex align-items-center gap-2">
          <span class="text-secondary small text-nowrap">現在の棋譜:</span>
          <input type="text" id="current-kifu" class="form-control form-control-sm" readonly style="min-width:0; flex:1;">
          <button class="btn btn-outline-secondary btn-sm text-nowrap" onclick="copyCurrentKifu()">コピー</button>
        </div>
      </div>

      <div class="mt-2 d-flex justify-content-center align-items-center gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="copy-url-btn" onclick="copyShareURL()">URLをコピー</button>
        <span id="url-copy-msg" class="small text-success" style="display:none;">コピーしました</span>
      </div>

      <div class="mt-2 d-flex justify-content-center align-items-center gap-2">
        <span class="text-secondary small text-nowrap">全読み開始:</span>
        <input type="number" id="solver-depth" class="form-control form-control-sm text-center"
               min="6" max="24" value="20" style="width:70px;">
        <span class="text-secondary small text-nowrap">手前</span>
        <button class="btn btn-outline-secondary btn-sm text-nowrap" id="confirm-depth-btn">確定</button>
      </div>
      <div id="depth-warning" class="text-center small mt-1" style="display:none;"></div>

      <div id="name-area" class="mt-2 mb-1 d-flex justify-content-center align-items-center gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('name-inputs').classList.toggle('d-none')">プレイヤー名設定</button>

        <span id="name-inputs" class="d-none d-flex align-items-center gap-2">
          ⚫<input type="text" id="black-name-input" class="form-control form-control-sm" style="width:90px" placeholder="黒" oninput="updateNames()" onclick="this.select()">
          <button class="btn btn-outline-secondary btn-sm px-1" onclick="swapNames()" title="名前を入れ替え">⇄</button>
          ⚪<input type="text" id="white-name-input" class="form-control form-control-sm" style="width:90px" placeholder="白" oninput="updateNames()" onclick="this.select()">
        </span><button id="stone-toggle" class="btn btn-outline-secondary btn-sm" onclick="toggleStones()">野獣先輩モード</button>
        <button id="num-toggle" class="btn btn-outline-secondary btn-sm" onclick="toggleMoveNumbers()">着手順を表示</button>
      </div>
    </div>

  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-bs-theme', next);
  localStorage.setItem('othello-theme', next);
  updateToggleBtn(next);
}
function updateToggleBtn(theme) {
  const btn = document.getElementById('theme-toggle');

  const isMobile = window.matchMedia("(max-width: 560px)").matches;
  if (isMobile) {
    // スマホはアイコンだけ（省スペース）
    btn.textContent = theme === 'dark' ? '☀' : '🌙';
  } else {
    // PCは文字付き
    btn.textContent = theme === 'dark' ? '☀ ライト' : '🌙 ダーク';
  }

  // ついでにツールチップで意味を残す
  btn.title = theme === 'dark' ? 'ライトに切替' : 'ダークに切替';
}
updateToggleBtn(document.documentElement.getAttribute('data-bs-theme'));
window.addEventListener('resize', () => {
  updateToggleBtn(document.documentElement.getAttribute('data-bs-theme'));
});

function toggleStones() {
  const isCustom = document.body.classList.toggle('custom-stones');
  localStorage.setItem('othello-stones', isCustom ? 'custom' : 'default');
  document.getElementById('stone-toggle').textContent = isCustom ? '標準の石' : '野獣先輩モード';
}
if (localStorage.getItem('othello-stones') === 'custom') {
  document.body.classList.add('custom-stones');
  document.getElementById('stone-toggle').textContent = '標準の石';
}
