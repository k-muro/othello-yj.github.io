// CSSロード前にテーマを適用してフラッシュ防止
(function() {

})();

<div class="container">

        <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" onclick="toggleTheme()"></button>

    <div id="board"></div>

          <div class="stat-label">残</div>
        </div>
        <div class="stat-card stat-card-white">
          <div class="stat-mini-stone"></div>
          <div class="stat-num" id="sc-white">2</div>
          <div class="stat-label" id="sc-white-name">白</div>

      </div>
      <div class="balance-bar-wrap">

    <p id="info" class="mb-2"></p>
    <p id="opening-name" class="mb-1 text-secondary small"></p>

<div class="d-flex flex-wrap justify-content-center gap-1 mb-2 nav-control-group">

  <button id="btn-undo10" class="btn btn-outline-secondary btn-sm" onclick="undo10()">◀◀ 10手戻</button>
  <button id="btn-undo"   class="btn btn-outline-secondary btn-sm" onclick="undo()">◀ 戻る</button>

  <button id="btn-redo"   class="btn btn-outline-secondary btn-sm" onclick="redo()">▶ 進む</button>
  <button id="btn-redo10" class="btn btn-outline-secondary btn-sm" onclick="redo10()">10手進 ▶▶</button>
  <button id="btn-last"   class="btn btn-outline-secondary btn-sm" onclick="goToLast()">最後 ⏭</button>
</div>

    <div class="d-flex align-items-center gap-2 my-3 collapse-toggle collapsed"

      <div class="collapse-divider"></div>
    </div>

    <div class="collapse" id="analysis-panel">
    <div class="d-flex gap-2 mb-2">

    </div>

    <div id="graph-area" class="mt-2">

      </div>

        <canvas id="score-graph"></canvas>

      <div id="mistake-list" class="mt-1"></div>

    </div>

    <div class="d-flex align-items-center gap-2 my-3 collapse-toggle collapsed"

        <span id="name-inputs" class="d-none d-flex align-items-center gap-2">
          ⚫<input type="text" id="black-name-input" class="form-control form-control-sm name-input" placeholder="黒" oninput="updateNames()" onclick="this.select()">
          <button class="btn btn-outline-secondary btn-sm px-1" onclick="swapNames()" title="名前を入れ替え">⇄</button>
          ⚪<input type="text" id="white-name-input" class="form-control form-control-sm name-input" placeholder="白" oninput="updateNames()" onclick="this.select()">
        </span>

               min="6" max="24" value="20">

      </div>

    </div>

    <p class="text-secondary mt-3 mb-0 copyright">™&amp;© Othello, Co. and MegaHouse</p>

  </div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-bs-theme', next);
  localStorage.setItem('othello-theme', next);
  updateToggleBtn(next);
}
function updateToggleBtn(theme) {
  const btn = document.getElementById('theme-toggle');

  const isMobile = window.matchMedia("(max-width: 560px)").matches;
  if (isMobile) {
    // スマホはアイコンだけ（省スペース）
    btn.textContent = theme === 'dark' ? '☀' : '🌙';
  } else {
    // PCは文字付き
    btn.textContent = theme === 'dark' ? '☀ ライト' : '🌙 ダーク';
  }

  // ついでにツールチップで意味を残す
  btn.title = theme === 'dark' ? 'ライトに切替' : 'ダークに切替';
}
updateToggleBtn(document.documentElement.getAttribute('data-bs-theme'));
window.addEventListener('resize', () => {
  updateToggleBtn(document.documentElement.getAttribute('data-bs-theme'));
});

function toggleStones() {
  const isCustom = document.body.classList.toggle('custom-stones');
  localStorage.setItem('othello-stones', isCustom ? 'custom' : 'default');
  document.getElementById('stone-toggle').textContent = isCustom ? '標準の石' : '野獣先輩モード';
}
if (localStorage.getItem('othello-stones') === 'custom') {
  document.body.classList.add('custom-stones');
  document.getElementById('stone-toggle').textContent = '標準の石';
}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
// Egaroucid WASM をサブディレクトリから読み込む
var Module = {
  noInitialRun: true,
  locateFile: (path) => 'js/' + path,
  onRuntimeInitialized: function() {
    if (typeof onEgaroucidReady === 'function') onEgaroucidReady();
  },
  onAbort: function(what) {
    clearTimeout(window._aiLoadTimer);
    if (typeof setAiStatus === 'function') setAiStatus('AI読み込み失敗 (再読込で再試行)', '#dc3545');
    console.error('Egaroucid WASM aborted:', what);
  }
};
// 30秒以内に初期化されなければタイムアウト扱い
window._aiLoadTimer = setTimeout(function() {
  if (typeof egaroucidReady !== 'undefined' && !egaroucidReady) {
    if (typeof setAiStatus === 'function') setAiStatus('AI読み込みタイムアウト (再読込で再試行)', '#dc3545');
  }
}, 15000);
</script>
